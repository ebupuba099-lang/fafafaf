name: 生成新一期序列

on:
  schedule:
    - cron: '27 22 * * *'  # UTC 22:27 = 北京时间 06:27
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install requests
        run: pip install requests
      
      - name: Generate new sequences
        env:
          GIST_ID: d32d11b8ed886ed36b2d2cf57e693e54
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/generate.py
      
      - name: Sync data to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/lottery_data.json
          git diff --cached --quiet || git commit -m "🤖 自动生成新一期序列 $(date +%Y-%m-%d)"
          git push
