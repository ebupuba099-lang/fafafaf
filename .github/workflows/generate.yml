name: 发发发每日生成
on:
  schedule:
    - cron: '27 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install requests
      - name: 执行生成脚本
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/generate.py
