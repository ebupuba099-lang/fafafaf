name: 发发发每日生成
on:
  schedule:
    - cron: '27 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 执行生成脚本
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/generate.py
      - name: 同步数据到仓库
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_ID: d32d11b8ed886ed36b2d2cf57e693e54
        run: |
          mkdir -p data
          curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/gists/$GIST_ID" > /tmp/gist.json
          python3 -c "
          import json
          with open('/tmp/gist.json') as f:
              data = json.load(f)
          content = data['files']['lottery_data.json']['content']
          with open('data/lottery_data.json', 'w') as f:
              f.write(content)
          print('Synced data/lottery_data.json from Gist')
          "
      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/lottery_data.json
          git diff --cached --quiet || git commit -m "auto: sync data from Gist [generate]"
          git push
