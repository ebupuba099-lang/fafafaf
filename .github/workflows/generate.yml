name: 神仙连每日生成

on:
  schedule:
    - cron: '27 22 * * *'    # UTC 22:27 = 北京时间 06:27
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/generate.py
        env:
          TZ: Asia/Shanghai
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
