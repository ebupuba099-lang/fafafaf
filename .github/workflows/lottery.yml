name: 抓取开奖号码

on:
  schedule:
    - cron: '0 14 * * *'    # UTC 14:00 = 北京时间 22:00（开奖后主触发）
    - cron: '0 16 * * *'    # UTC 16:00 = 北京时间 00:00（午夜补抓）
    - cron: '30 2 * * *'    # UTC 02:30 = 北京时间 10:30（上午补抓）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-lottery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 抓取开奖号码
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python3 scripts/lottery.py
