name: 神仙连开奖填入

on:
  schedule:
    - cron: '40 13 * * *'    # UTC 13:40 = 北京时间 21:40
    - cron: '0 15 * * *'     # UTC 15:00 = 北京时间 23:00
    - cron: '0 16 * * *'     # UTC 16:00 = 北京时间 00:00
    - cron: '30 2 * * *'     # UTC 02:30 = 北京时间 10:30 (上午补抓)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lottery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/lottery.py
        env:
          TZ: Asia/Shanghai
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
